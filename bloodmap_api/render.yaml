services:
  - type: web
    name: bloodmap-api
    env: docker
    rootDir: bloodmap_api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: blood_ph
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
